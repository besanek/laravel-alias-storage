name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            laravel: '10.*'
            testbench: '8.*'
          - php: '8.3'
            laravel: '10.*'
            testbench: '8.*'
          - php: '8.2'
            laravel: '11.*'
            testbench: '9.*'
          - php: '8.4'
            laravel: '11.*'
            testbench: '9.*'
          - php: '8.2'
            laravel: '12.*'
            testbench: '10.*'
          - php: '8.5'
            laravel: '12.*'
            testbench: '10.*'
          - php: '8.3'
            laravel: '13.*'
            testbench: '11.*'
          - php: '8.5'
            laravel: '13.*'
            testbench: '11.*'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
